<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Evelines Schulprojekte</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <header>Gymnasium Lerbermatt, Informatik E. Lehmann</header>
    <nav></nav>
    <main>
        <h1>Willkommen seist Du bei der Seite von E. Lehmann, Gymnasium Lerbermatt</h1>
        <p>Hier finden Sie bald einmal Unterrichtsmaterial.</p>
        <p>Ein grosser <em>Dank</em> geht raus an Daniel Hofer!</p>
        <h2>Bitte das <strong></strong>im Unterricht verteilte Passwort</strong> eingeben:</h2>
        <input type="password" id="passwordInput">
        <button onclick="checkPassword()">Weiter</button>

        <script>
            function checkPassword() {
                const password = document.getElementById('passwordInput').value;
                // Leitet direkt an passwort.html weiter
                window.location.href = password + ".html";
            }
        </script>
    </main>
</body>
</html>
